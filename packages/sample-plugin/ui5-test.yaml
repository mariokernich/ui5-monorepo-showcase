specVersion: "4.0"
metadata:
  name: com.myorg.myplugin
type: application
framework:
  name: SAPUI5
  version: "1.150.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
    - name: sap.tnt
    - name: sap.ui.dt
    - name: sap.ui.rta
    - name: sap.uxap
    - name: sap.suite.ui.generic.template
    - name: sap.ui.generic.template
    - name: sap.suite.ui.microchart
    - name: themelib_sap_horizon
builder:
  resources:
    excludes:
      - "test/e2e/**"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
server:
  customMiddleware:
    - name: cors-middleware
      afterMiddleware: csp
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
    - name: ui5-middleware-livereload
      afterMiddleware: compression
---
specVersion: "4.0"
kind: extension
type: server-middleware
metadata:
  name: cors-middleware
middleware:
  path: lib/middleware/cors.cjs
